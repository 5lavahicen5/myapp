        .input-bar { display: flex; gap: 8px; padding: 12px 16px; background: var(--bg-element); border-top: 1px solid var(--border); margin-bottom: -5px; justify-content: flex-start; }

        .sticker-panel { position: fixed; bottom: 80px; left: 10px; right: 10px; background: var(--bg-card); border-radius: 28px; max-height: 45vh; display: none; flex-direction: column; z-index: 90; border: 1px solid var(--accent); }
        .sticker-header { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); color: var(--text); }
        .sticker-grid { display: flex; flex-wrap: wrap; gap: 12px; padding: 16px; overflow-y: auto; }
        .sticker { width: 70px; height: 70px; object-fit: cover; border-radius: 16px; cursor: pointer; background: var(--bg-element); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 300; }
        .modal-content { background: var(--bg-card); border-radius: 32px; width: 85%; max-width: 300px; padding: 20px; text-align: center; }
        .modal-content button { width: 100%; padding: 14px; margin: 6px 0; border-radius: 60px; background: var(--bg-element); color: var(--text); cursor: pointer; border: none; }
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--accent); color: white; text-align: center; padding: 12px; border-radius: 40px; z-index: 400; animation: fadeOut 2s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .call-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 15px; backdrop-filter: blur(10px); }
        .call-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 48px; overflow: hidden; }
        .call-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .call-name { font-size: 22px; font-weight: bold; color: white; }
        .call-status { font-size: 14px; color: #ccc; }

        .call-btn-large { width: 60px; height: 60px; border-radius: 30px; border: none; font-size: 26px; cursor: pointer; background: #2c3e50; color: white; }
        .call-btn-accept { background: #2ecc71; }
        .call-btn-reject, .call-btn-hangup { background: #e74c3c; }
        .remote-video-container { width: 100%; max-width: 400px; background: black; border-radius: 20px; overflow: hidden; display: none; margin: 10px; }
        .remote-video-container video { width: 100%; max-height: 300px; background: black; }
        .local-video-preview { position: fixed; bottom: 20px; right: 20px; width: 120px; height: 160px; background: black; border-radius: 12px; border: 2px solid var(--accent); display: none; overflow: hidden; z-index: 510; }
        .local-video-preview video { width: 100%; height: 100%; object-fit: cover; }
        .group-creator { padding: 16px; }
        .friend-item { display: flex; align-items: center; gap: 12px; padding: 8px; }
        .video-preview-circle { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); width: 100px; height: 100px; border-radius: 50%; overflow: hidden; border: 3px solid var(--accent); background: black; z-index: 200; display: none; }
        .video-preview-circle video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="authPage" class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">🐺<h1>Wolf Messenger</h1></div>
        <div class="auth-tabs">

<div id="mainApp" class="app">

        <div><button id="createGroupBtn" class="icon-btn"><i class="fas fa-users"></i></button><button id="settingsBtn" class="icon-btn"><i class="fas fa-cog"></i></button></div>

    <div id="messagesArea" class="messages-area"></div>

    <div class="input-bar">

</div>

<div id="stickerPanel" class="sticker-panel"><div class="sticker-header"><span>⭐ Мои стикеры</span><button id="closeStickerPanel" style="background:none; border:none; color:var(--text); font-size:20px;">✕</button></div><div id="stickersGrid" class="sticker-grid"></div></div>
<div id="modal" class="modal"><div id="modalInner" class="modal-content"></div></div>

<div id="callOverlay" class="call-overlay">

</div>
<div id="localVideoPreview" class="local-video-preview"><video id="localPreviewVideo" autoplay muted playsinline></video></div>
<div id="videoPreviewCircle" class="video-preview-circle"><video id="previewVideo" autoplay muted playsinline></video></div>

<script>
    (function(){
        // ---------- Firebase ----------
        const firebaseConfig = {
            apiKey: "AIzaSyBASq241IVGHuYn8WsU3pynOY2PKGk0JAE",
            authDomain: "wolf-messenger-63b95.firebaseapp.com",
            databaseURL: "https://wolf-messenger-63b95-default-rtdb.firebaseio.com",
            projectId: "wolf-messenger-63b95",
            storageBucket: "wolf-messenger-63b95.firebasestorage.app",
            messagingSenderId: "752397009567",
            appId: "1:752397009567:web:8c04a2271f755ec0dd18aa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        let currentUser = null, currentChatId = null, allUsers = {};
        let userStickers = JSON.parse(localStorage.getItem('wolf_stickers') || '{}');
        let blockedUsers = JSON.parse(localStorage.getItem('blockedUsers') || '[]');
        let currentLang = localStorage.getItem('lang') || 'ru', currentTheme = localStorage.getItem('theme') || 'dark';

        let localStream = null, peerConnection = null, currentCallRef = null, callStartTime = null, remoteAudio = null;
        let isMicMuted = false, isVideoEnabled = false, localVideoTrack = null;
        let pressTimer = null, mediaRecorder = null, recordedChunks = [], recordingStream = null;
        let messagesListener = null, chatsListener = null, usersListener = null, callsListener = null;
        
        let recordMode = 'audio';

        const AI_ID = 'ai_assistant', AI_NAME = '🤖 Wolf AI';

        function t(key) {
            const tr = { ru: { settings:"⚙️ Настройки", logout:"🚪 Выйти", copy:"📋 Копировать", edit:"✏️ Изменить", delete:"🗑️ Удалить", callDuration:"📞 Звонок длился", cancel:"Отмена", deleteChat:"🗑️ Удалить чат", block:"🚫 Заблокировать", unblock:"🔓 Разблокировать", groupName:"Название группы", create:"Создать", changeAvatar:"🖼️ Сменить аватар", deleteAccount:"🗑️ Удалить аккаунт", language:"🌐 Язык", theme:"🎨 Тема", dark:"Тёмная", light:"Светлая" }, en: { settings:"Settings", logout:"Logout", copy:"Copy", edit:"Edit", delete:"Delete", callDuration:"Call lasted", cancel:"Cancel", deleteChat:"Delete chat", block:"Block", unblock:"Unblock", groupName:"Group name", create:"Create", changeAvatar:"Change avatar", deleteAccount:"Delete account", language:"Language", theme:"Theme", dark:"Dark", light:"Light" } };
            return tr[currentLang][key] || key;
        }
        function applyTheme() { if (currentTheme === 'light') document.body.classList.add('light'); else document.body.classList.remove('light'); localStorage.setItem('theme', currentTheme); }
        function toast(msg) { let el = document.createElement('div'); el.className = 'toast'; el.innerText = msg; document.body.appendChild(el); setTimeout(() => el.remove(), 2000); }
        function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        function normalize(s) { return s.toLowerCase().trim(); }
        function usernameToEmail(u) { return u.toLowerCase().replace(/[^a-z0-9]/g, '') + '@wolf.local'; }
        function setUserOnline(uid) { const ref = db.ref(`/status/${uid}`); ref.onDisconnect().set({ online: false, lastSeen: Date.now() }); ref.set({ online: true, lastSeen: Date.now() }); }
        function getUserOnline(uid, cb) { db.ref(`/status/${uid}/online`).on('value', snap => cb(snap.val() === true)); }

        async function updateAvatarUI() {
            if (!currentUser) return;
            const myDiv = document.getElementById('myAvatar');
            const snap = await db.ref(`users/${currentUser.uid}/avatar`).once('value');
            const av = snap.val();
            if (av) myDiv.innerHTML = `<img src="${av}" style="width:100%;height:100%;object-fit:cover;"><div id="myOnlineDot" class="online-dot"></div>`;
            else myDiv.innerHTML = '🐺<div id="myOnlineDot" class="online-dot"></div>';
            if (currentChatId) {
                const otherUid = window._otherUid;
                if (otherUid && otherUid !== AI_ID) {
                    const otherAv = await db.ref(`users/${otherUid}/avatar`).once('value');
                    const chatAv = document.getElementById('chatAvatar');
                    if (otherAv.val()) chatAv.innerHTML = `<img src="${otherAv.val()}" style="width:100%;height:100%;object-fit:cover;"><div id="chatOnlineDot" class="online-dot"></div>`;
                    else chatAv.innerHTML = `?<div id="chatOnlineDot" class="online-dot"></div>`;
                    getUserOnline(otherUid, online => { let dot = document.getElementById('chatOnlineDot'); if (dot) dot.style.display = online ? 'block' : 'none'; });
                }
            }
            getUserOnline(currentUser.uid, online => { let dot = document.getElementById('myOnlineDot'); if (dot) dot.style.display = online ? 'block' : 'none'; });
        }
        async function setMyAvatar(file) { if (!file || !currentUser) return; const reader = new FileReader(); reader.onload = async e => { await db.ref(`users/${currentUser.uid}/avatar`).set(e.target.result); toast('✅ Аватарка обновлена'); updateAvatarUI(); }; reader.readAsDataURL(file); }

        function loadAllUsers() {
            if (usersListener && typeof usersListener.off === 'function') usersListener.off();
            usersListener = db.ref('users').on('value', snap => {
                const data = snap.val() || {};
                allUsers = {};
                for (let uid in data) if (data[uid].username) allUsers[data[uid].username] = { uid, ...data[uid] };
                performSearch();
                loadChats();
            });
        }
        function performSearch() {
            const query = document.getElementById('searchUser').value.trim();
            const resDiv = document.getElementById('searchResults');
            if (!query) { resDiv.style.display = 'none'; return; }
            if (Object.keys(allUsers).length === 0) { resDiv.style.display = 'none'; return; }
            const q = normalize(query);
            const results = [];
            for (let name in allUsers) if (name !== currentUser?.username && normalize(name).includes(q)) results.push(name);
            if (results.length === 0) { resDiv.style.display = 'none'; return; }
            resDiv.style.display = 'block';
            resDiv.innerHTML = results.slice(0,5).map(nick => `<div class="search-item" data-nick="${escapeHtml(nick)}">${escapeHtml(nick)}</div>`).join('');
            document.querySelectorAll('.search-item').forEach(el => { el.onclick = () => { document.getElementById('searchUser').value = ''; resDiv.style.display = 'none'; createOrOpenChat(el.dataset.nick); }; });
        }
        async function createOrOpenChat(targetNick) {
            if (!targetNick || targetNick === currentUser.username) return toast('Некорректный ник');
            const target = allUsers[targetNick];
            if (!target) return toast(`Пользователь ${targetNick} не найден`);
            if (blockedUsers.includes(target.uid)) return toast('Пользователь заблокирован');
            const snap = await db.ref('chats').once('value');
            let chatId = null;
            snap.forEach(child => { const c = child.val(); if (c.type !== 'group' && c.participants && c.participants[currentUser.uid] && c.participants[target.uid]) chatId = child.key; });
            if (!chatId) {
                const newChat = db.ref('chats').push();
                await newChat.set({ participants: { [currentUser.uid]: true, [target.uid]: true }, type: 'private', createdAt: Date.now() });
                chatId = newChat.key;
                toast(`✅ Чат с ${targetNick} создан`);
            }

        function updateRecordButtonIcon() {

        function startRecording() {
            if (pressTimer) clearTimeout(pressTimer);
            pressTimer = setTimeout(async () => {
                recordedChunks = [];
                try {
                    if (recordMode === 'audio') {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        recordingStream = stream;
                        mediaRecorder = new MediaRecorder(stream);
                        mediaRecorder.ondataavailable = e => { if (e.data.size) recordedChunks.push(e.data); };
                        mediaRecorder.onstop = () => {
                            const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                            const reader = new FileReader();
                            reader.readAsDataURL(blob);
                            reader.onloadend = () => { sendMessage('', reader.result, 'audio'); if (recordingStream) recordingStream.getTracks().forEach(t => t.stop()); };
                            if (recordBtn) recordBtn.classList.remove('recording-active');
                        };
                        mediaRecorder.start();
                        if (recordBtn) recordBtn.classList.add('recording-active');
                        toast('🎙 Запись... отпустите');
                    } else if (recordMode === 'video') {
                        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                        recordingStream = stream;
                        const preview = document.getElementById('previewVideo');
                        preview.srcObject = stream;
                        document.getElementById('videoPreviewCircle').style.display = 'block';
                        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                        mediaRecorder.ondataavailable = e => { if (e.data.size) recordedChunks.push(e.data); };
                        mediaRecorder.onstop = () => {
                            const blob = new Blob(recordedChunks, { type: 'video/webm' });
                            const reader = new FileReader();
                            reader.readAsDataURL(blob);
                            reader.onloadend = () => { sendMessage('', reader.result, 'video'); if (recordingStream) recordingStream.getTracks().forEach(t => t.stop()); document.getElementById('videoPreviewCircle').style.display = 'none'; preview.srcObject = null; };
                            if (recordBtn) recordBtn.classList.remove('recording-active');
                        };
                        mediaRecorder.start();
                        if (recordBtn) recordBtn.classList.add('recording-active');
                        toast('📹 Запись видео... отпустите');
                        setTimeout(() => { if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording(); }, 15000);
                    }
                } catch(e) { toast('Ошибка доступа'); }
            }, 150);
        }
        
        function stopRecording() {
            if (pressTimer) clearTimeout(pressTimer);
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                mediaRecorder = null;
            }
            if (recordingStream) { 
                recordingStream.getTracks().forEach(t => t.stop()); 
                recordingStream = null; 
            }
            document.getElementById('videoPreviewCircle').style.display = 'none';
            if (recordBtn) recordBtn.classList.remove('recording-active');
        }
        
        if (recordBtn) {

            const newRecordBtn = recordBtn.cloneNode(true);
            recordBtn.parentNode.replaceChild(newRecordBtn, recordBtn);
            const finalRecordBtn = document.getElementById('recordBtn');
            
            // Один клик - переключение режима (и иконка меняется)
            finalRecordBtn.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                recordMode = recordMode === 'audio' ? 'video' : 'audio';

                toast(recordMode === 'audio' ? '🎙 Режим голосового сообщения' : '📹 Режим видео-кружочка');
            };
            // Зажатие - запись
            finalRecordBtn.addEventListener('mousedown', startRecording);
            finalRecordBtn.addEventListener('mouseup', stopRecording);

            finalRecordBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });

        async function toggleVideo() {

                try {
                    const vidStream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 640 }, height: { ideal: 480 } } });

        async function startCall(chatId, targetUid) { if (!navigator.mediaDevices) return toast('Браузер не поддерживает звонки'); try { localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } }); peerConnection = await initPeerConnection(); localStream.getAudioTracks().forEach(t => peerConnection.addTrack(t, localStream)); const callId = `${chatId}_${Date.now()}`; currentCallRef = db.ref(`calls/${callId}`); const offer = await peerConnection.createOffer(); await peerConnection.setLocalDescription(offer); await currentCallRef.set({ offer: { type: offer.type, sdp: offer.sdp }, target: targetUid, from: currentUser.uid, status: 'waiting', startTime: Date.now() }); callStartTime = Date.now(); currentCallRef.on('child_added', async snap => { if (snap.key === 'answer') { await peerConnection.setRemoteDescription(new RTCSessionDescription(snap.val())); showCallUI('active'); } else if (snap.key === 'candidates' && peerConnection.remoteDescription) { await peerConnection.addIceCandidate(new RTCIceCandidate(JSON.parse(snap.val()))); } else if (snap.key === 'hangup') endCall(true); }); showCallUI('calling'); } catch(e) { toast('Ошибка звонка'); } }
        function listenForCalls() { if (callsListener && typeof callsListener.off === 'function') callsListener.off(); const query = db.ref('calls').orderByChild('target').equalTo(currentUser.uid); callsListener = query.on('child_added', snap => { const call = snap.val(); if (!call || call.status !== 'waiting') return; if (call.target !== currentUser.uid) return; if (!call.from || call.from === currentUser.uid) return; if (peerConnection) return; if (!Object.values(allUsers).some(u => u.uid === call.from)) return; currentCallRef = snap.ref; callStartTime = call.startTime || Date.now(); showCallUI('incoming', call.from); document.getElementById('callAcceptBtn').onclick = () => answerCall(snap.ref, call); document.getElementById('callRejectBtn').onclick = () => { snap.ref.child('hangup').set(true); hideCallUI(); }; }); }

ML = '<i class="fas fa-microphone"></i>'; video.innerHTML = '<i class="fas fa-video"></i>'; isVideoEnabled = false; isMicMuted = false; } ov.style.display = 'flex'; }

            document.getElementById('chatScreen').style.display = 'flex';
            db.ref(`chats/${chatId}`).once('value', async snap => {
                const chat = snap.val();
                let displayName = chat.type === 'group' ? chat.groupName : '';
                const otherUid = chat.type !== 'group' ? Object.keys(chat.participants).find(uid => uid !== currentUser.uid) : null;
                window._otherUid = otherUid;
                if (!displayName && otherUid) displayName = otherUid === AI_ID ? AI_NAME : (allUsers[Object.values(allUsers).find(u => u.uid === otherUid)?.username]?.username || 'Собеседник');
                document.getElementById('chatName').innerText = displayName;
                const avatarDiv = document.getElementById('chatAvatar');
                if (chat.type === 'group') avatarDiv.innerHTML = '<i class="fas fa-users"></i><div id="chatOnlineDot" class="online-dot" style="display:none;"></div>';
                else if (otherUid && otherUid !== AI_ID) {
                    const av = await db.ref(`users/${otherUid}/avatar`).once('value');
                    if (av.val()) avatarDiv.innerHTML = `<img src="${av.val()}" style="width:100%;height:100%;object-fit:cover;"><div id="chatOnlineDot" class="online-dot"></div>`;
                    else avatarDiv.innerHTML = `?<div id="chatOnlineDot" class="online-dot"></div>`;
                    getUserOnline(otherUid, online => { let dot = document.getElementById('chatOnlineDot'); if (dot) dot.style.display = online ? 'block' : 'none'; });
                } else avatarDiv.innerHTML = `${otherUid === AI_ID ? '🤖' : '?'}<div id="chatOnlineDot" class="online-dot"></div>`;
                if (chat.type === 'group' && chat.createdBy === currentUser.uid && !document.getElementById('deleteGroupBtnChat')) {
                    const btn = document.createElement('button'); btn.id = 'deleteGroupBtnChat'; btn.className = 'icon-btn'; btn.innerHTML = '<i class="fas fa-trash-alt"></i>'; btn.style.marginLeft = '8px'; btn.onclick = () => { if (confirm('Удалить группу?')) deleteGroup(chatId); }; document.querySelector('.chat-header').appendChild(btn);
                } else { let ex = document.getElementById('deleteGroupBtnChat'); if (ex) ex.remove(); }
            });
            messagesListener = db.ref(`messages/${chatId}`).orderByChild('time').on('value', snap => { const msgs = []; snap.forEach(child => { let m = child.val(); m._id = child.key; msgs.push(m); }); renderMessages(msgs); });
        }

        function loadChats() {
            if (chatsListener && typeof chatsListener.off === 'function') chatsListener.off();
            chatsListener = db.ref('chats').orderByChild(`participants/${currentUser.uid}`).equalTo(true).on('value', async snap => {
                const chats = [];
                const promises = [];
                snap.forEach(child => {
                    const c = child.val();
                    if (c.type === 'group') {
                        chats.push({ id: child.key, name: c.groupName, lastMsg: c.lastMessage?.text || 'Новый чат', time: c.lastMessage?.time || 0, isGroup: true, avatar: null });
                    } else {
                        const otherUid = Object.keys(c.participants).find(uid => uid !== currentUser.uid);
                        let otherName = otherUid === AI_ID ? AI_NAME : (allUsers[Object.values(allUsers).find(u => u.uid === otherUid)?.username]?.username || '...');
                        let avatarPromise = db.ref(`users/${otherUid}/avatar`).once('value').then(s => s.val());
                        promises.push(avatarPromise);
                        chats.push({ id: child.key, name: otherName, lastMsg: c.lastMessage?.text || 'Новый чат', time: c.lastMessage?.time || 0, otherUid, avatarPromise });
                    }
                });
                const avatars = await Promise.all(promises);
                let avatarIndex = 0;
                for (let i = 0; i < chats.length; i++) {
                    if (!chats[i].isGroup && chats[i].avatarPromise) {
                        chats[i].avatar = avatars[avatarIndex++];
                        delete chats[i].avatarPromise;
                    }
                }
                chats.sort((a,b) => b.time - a.time);
                const container = document.getElementById('chatsList');
                if (!chats.length) { container.innerHTML = '<div style="text-align:center;padding:40px;">📭 Нет чатов<br>🔍 Найди друга через поиск</div>'; return; }
                container.innerHTML = chats.map(chat => {
                    let avatarHtml = '';
                    if (chat.isGroup) {
                        avatarHtml = '<i class="fas fa-users"></i>';
                    } else if (chat.avatar) {
                        avatarHtml = `<img src="${chat.avatar}" style="width:100%;height:100%;object-fit:cover;">`;
                    } else {
                        avatarHtml = chat.name.charAt(0).toUpperCase();
                    }
                    return `<div class="chat-row" data-chat-id="${chat.id}"><div class="chat-avatar">${avatarHtml}<div class="chat-online" style="display:none;"></div></div><div class="chat-details"><div class="chat-name">${escapeHtml(chat.name)}</div><div class="last-msg">${escapeHtml(chat.lastMsg)}</div></div></div>`;
                }).join('');
                document.querySelectorAll('.chat-row').forEach(el => { el.onclick = () => openChat(el.dataset.chatId); });
            });
        }

        async function logout() {
            if (messagesListener && typeof messagesListener.off === 'function') messagesListener.off();
            if (chatsListener && typeof chatsListener.off === 'function') chatsListener.off();
            if (usersListener && typeof usersListener.off === 'function') usersListener.off();
            if (callsListener && typeof callsListener.off === 'function') callsListener.off();
            if (peerConnection) await endCall(false);
            try { await auth.signOut(); } catch(e) { console.warn(e); }
            currentUser = null; currentChatId = null; window._otherUid = null; allUsers = {};
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'none';
            document.getElementById('authPage').style.display = 'flex';
            document.getElementById('loginNick').value = '';
            document.getElementById('loginPass').value = '';
            document.getElementById('regNick').value = '';
            document.getElementById('regPass').value = '';
            toast('Вы вышли');
        }

        // === ОБРАБОТЧИКИ ===
        const backButton = document.getElementById('closeChat');
        if (backButton) {
            backButton.onclick = function(e) {
                e.preventDefault();
                if (messagesListener && typeof messagesListener.off === 'function') messagesListener.off();
                messagesListener = null;
                const msgArea = document.getElementById('messagesArea');
                if (msgArea) msgArea.innerHTML = '';
                const chatScreen = document.getElementById('chatScreen');
                const mainApp = document.getElementById('mainApp');
                if (chatScreen) chatScreen.style.display = 'none';
                if (mainApp) mainApp.style.display = 'flex';
                currentChatId = null;
                const del = document.getElementById('deleteGroupBtnChat');
                if (del) del.remove();
            };
        }

        document.getElementById('callBtn').onclick = async () => { const ou = window._otherUid; if (!ou || ou === AI_ID) return toast('Нельзя позвонить ИИ'); startCall(currentChatId, ou); };
        document.getElementById('sendBtn').onclick = () => sendMessage(document.getElementById('messageInput').value);
        document.getElementById('messageInput').onkeypress = e => { if (e.key === 'Enter') sendMessage(e.target.value); };
        document.getElementById('stickerBtn').onclick = () => document.getElementById('stickerPanel').style.display = 'flex';
        document.getElementById('closeStickerPanel').onclick = () => document.getElementById('stickerPanel').style.display = 'none';
        document.getElementById('genStickerBtn').onclick = () => { const p = document.getElementById('aiPrompt').value; if (p) sendMessage(p); document.getElementById('aiPrompt').value = ''; };
        document.getElementById('searchUser').addEventListener('input', performSearch);
        document.addEventListener('click', e => { if (!e.target.closest('.search-container')) document.getElementById('searchResults').style.display = 'none'; });

        document.getElementById('settingsBtn').onclick = () => {
            const modal = document.getElementById('modal');
            const inner = document.getElementById('modalInner');
            inner.innerHTML = `<h3>${t('settings')}</h3><button id="langBtn">${t('language')}: ${currentLang === 'ru' ? 'Русский' : 'English'}</button><button id="themeBtn">${t('theme')}: ${currentTheme === 'dark' ? t('dark') : t('light')}</button><button id="changeAvatarBtn">${t('changeAvatar')}</button><button id="logoutBtn">${t('logout')}</button><button id="deleteAccountBtn">${t('deleteAccount')}</button><button id="closeModalBtn">${t('cancel')}</button>`;
            modal.style.display = 'flex';
            document.getElementById('langBtn').onclick = () => { currentLang = currentLang === 'ru' ? 'en' : 'ru'; localStorage.setItem('lang', currentLang); document.getElementById('settingsBtn').click(); };
            document.getElementById('themeBtn').onclick = () => { currentTheme = currentTheme === 'dark' ? 'light' : 'dark'; applyTheme(); document.getElementById('settingsBtn').click(); };
            document.getElementById('changeAvatarBtn').onclick = () => { modal.style.display = 'none'; const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*'; inp.onchange = e => setMyAvatar(e.target.files[0]); inp.click(); };
            document.getElementById('logoutBtn').onclick = async () => { modal.style.display = 'none'; await logout(); };
            document.getElementById('deleteAccountBtn').onclick = async () => { if (confirm('Удалить аккаунт навсегда?')) { await db.ref('users/'+currentUser.uid).remove(); await currentUser.delete(); localStorage.clear(); await logout(); } };
            document.getElementById('closeModalBtn').onclick = () => modal.style.display = 'none';
        };
        document.getElementById('myAvatar').onclick = () => document.getElementById('settingsBtn').click();
        document.getElementById('createGroupBtn').onclick = () => {
            const modal = document.getElementById('modal');
            const inner = document.getElementById('modalInner');
            inner.innerHTML = `<div class="group-creator"><h3>👥 Создать группу</h3><input id="groupName" placeholder="${t('groupName')}"><div id="friendsList"></div><button id="confirmGroup">${t('create')}</button><button id="cancelGroup">${t('cancel')}</button></div>`;
            modal.style.display = 'flex';
            const friends = Object.values(allUsers).filter(u => u.uid !== currentUser.uid && !blockedUsers.includes(u.uid));
            document.getElementById('friendsList').innerHTML = friends.map(f => `<div class="friend-item"><input type="checkbox" value="${f.uid}" id="fr_${f.uid}"><label for="fr_${f.uid}">${escapeHtml(f.username)}</label></div>`).join('');
            document.getElementById('confirmGroup').onclick = () => { const name = document.getElementById('groupName').value.trim(); if (!name) return toast('Введите название'); const sel = [...document.querySelectorAll('#friendsList input:checked')].map(cb => cb.value); if (!sel.length) return toast('Выберите участников'); createGroup(name, sel); modal.style.display = 'none'; };
            document.getElementById('cancelGroup').onclick = () => modal.style.display = 'none';
        };
        document.getElementById('chatAvatar').onclick = () => {
            const ou = window._otherUid;
            if (!ou || ou === AI_ID) return;
            const modal = document.getElementById('modal');
            const inner = document.getElementById('modalInner');
            const uname = Object.values(allUsers).find(u => u.uid === ou)?.username || 'Пользователь';
            inner.innerHTML = `<h3>👤 Профиль</h3><div style="font-size:24px;">${escapeHtml(uname)}</div><button id="deleteChatBtn">🗑️ ${t('deleteChat')}</button><button id="blockBtn">${blockedUsers.includes(ou) ? t('unblock') : t('block')}</button><button id="closeProfileBtn">${t('cancel')}</button>`;
            modal.style.display = 'flex';
            document.getElementById('deleteChatBtn').onclick = async () => { if (confirm('Удалить чат?')) { await db.ref(`chats/${currentChatId}`).remove(); await db.ref(`messages/${currentChatId}`).remove(); modal.style.display = 'none'; document.getElementById('closeChat').click(); } };
            document.getElementById('blockBtn').onclick = () => { if (!blockedUsers.includes(ou)) blockedUsers.push(ou); else blockedUsers = blockedUsers.filter(id => id !== ou); localStorage.setItem('blockedUsers', JSON.stringify(blockedUsers)); toast(blockedUsers.includes(ou) ? 'Заблокирован' : 'Разблокирован'); modal.style.display = 'none'; };
            document.getElementById('closeProfileBtn').onclick = () => modal.style.display = 'none';
        };
        document.getElementById('chatName').onclick = document.getElementById('chatAvatar').onclick;

        async function handleLogin(user, pass) { try { const cred = await auth.signInWithEmailAndPassword(usernameToEmail(user), pass); const snap = await db.ref('users/'+cred.user.uid).once('value'); currentUser = { uid: cred.user.uid, username: snap.val()?.username || user }; startApp(); } catch(e) { document.getElementById('loginError').innerText = 'Неверный ник или пароль'; } }
        async function handleRegister(user, pass) { if (!/^[a-zA-Z0-9._]{3,32}$/.test(user)) { document.getElementById('regError').innerText = 'Ник: 3-32 латиница, цифры, . _'; return; } if (pass.length < 3) { document.getElementById('regError').innerText = 'Пароль ≥3'; return; } try { const cred = await auth.createUserWithEmailAndPassword(usernameToEmail(user), pass); await cred.user.updateProfile({ displayName: user }); await db.ref('users/'+cred.user.uid).set({ username: user, uid: cred.user.uid, createdAt: Date.now() }); currentUser = { uid: cred.user.uid, username: user }; startApp(); } catch(e) { document.getElementById('regError').innerText = e.message; } }
        async function handleGuest() { try { const cred = await auth.signInAnonymously(); const guestName = 'guest_' + Math.random().toString(36).substr(2,6); await db.ref('users/'+cred.user.uid).set({ username: guestName, uid: cred.user.uid, isGuest: true }); currentUser = { uid: cred.user.uid, username: guestName }; startApp(); } catch(e) { toast('Ошибка гостевого входа'); } }
        document.getElementById('doLogin').onclick = () => handleLogin(document.getElementById('loginNick').value.trim(), document.getElementById('loginPass').value);
        document.getElementById('doRegister').onclick = () => handleRegister(document.getElementById('regNick').value.trim(), document.getElementById('regPass').value);
        document.getElementById('doGuest').onclick = () => handleGuest();
        document.querySelectorAll('.auth-tab').forEach(tab => { tab.onclick = () => { document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); const type = tab.dataset.tab; document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.add('hidden'); document.getElementById('guestForm').classList.add('hidden'); document.getElementById(type+'Form').classList.remove('hidden'); }; });
        auth.onAuthStateChanged(async user => { if (user && !currentUser) { const snap = await db.ref('users/'+user.uid).once('value'); currentUser = { uid: user.uid, username: snap.val()?.username || user.displayName || 'User' }; startApp(); } else if (!user && !currentUser) { document.getElementById('authPage').style.display = 'flex'; document.getElementById('mainApp').style.display = 'none'; document.getElementById('chatScreen').style.display = 'none'; } });

        async function startApp() {
            const oldCalls = await db.ref('calls').orderByChild('target').equalTo(currentUser.uid).once('value');
            const updates = {};
            oldCalls.forEach(snap => { if (snap.val().status === 'waiting') updates[snap.key] = null; });
            if (Object.keys(updates).length) await db.ref('calls').update(updates);
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('myUsername').innerText = currentUser.username;
            updateAvatarUI();
            loadAllUsers();
            renderStickersPanel();
            setUserOnline(currentUser.uid);
            listenForCalls();
            updateRecordButtonIcon();
            db.ref('chats').orderByChild(`participants/${currentUser.uid}`).equalTo(true).once('value', async snap => { let hasAI = false; snap.forEach(child => { if (child.val().participants[AI_ID]) hasAI = true; }); if (!hasAI) { const newChat = db.ref('chats').push(); await newChat.set({ participants: { [currentUser.uid]: true, [AI_ID]: true }, type: 'private', createdAt: Date.now(), lastMessage: { text: '🤖 Привет! Я Wolf AI. Напиши "сгенерируй кота" для стикера', time: Date.now() } }); } });
        }
        applyTheme();
    })();
</script>
</body>
</html>
